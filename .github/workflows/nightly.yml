name: Scheduled Checks

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --config=tests/playwright.config.ts

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Build and start app
        run: |
          npm install
          cd backend && npm install && npm run build
          cd ../frontend && npm install && npm run build
          cd ..
          cp -r frontend/dist backend/public
          cd backend && node dist/index.js &
          sleep 5

      - name: Run Lighthouse audit
        run: |
          mkdir -p lighthouse-results
          lhci collect \
            --url=http://localhost:3000 \
            --numberOfRuns=1 \
            --settings.preset=desktop \
          || true
          # Copy results from .lighthouseci to our directory
          cp .lighthouseci/lhr-*.json lighthouse-results/ 2>/dev/null || true

      - name: Generate summary
        run: |
          JSON_FILE=$(ls lighthouse-results/lhr-*.json 2>/dev/null | head -1)
          if [ -n "$JSON_FILE" ]; then
            echo "## Lighthouse Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Report saved as artifact. Download to view full results." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            SCORES=$(node -e "
              const data = require('$JSON_FILE');
              const cats = data.categories || {};
              const lines = [];
              for (const [name, cat] of Object.entries(cats)) {
                const score = Math.round((cat.score || 0) * 100);
                const emoji = score >= 90 ? ':green_circle:' : score >= 50 ? ':yellow_circle:' : ':red_circle:';
                lines.push('| ' + name + ' | ' + emoji + ' ' + score + ' |');
              }
              console.log('| Category | Score |');
              console.log('|---|---|');
              console.log(lines.join('\n'));
            " 2>/dev/null || echo "Could not parse scores")
            echo "$SCORES" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Lighthouse: no results generated" >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: lighthouse-report
          path: lighthouse-results/
          retention-days: 7

      - name: Stop app
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true

  opencode-summary:
    runs-on: ubuntu-latest
    needs: [e2e, lighthouse]
    if: always()
    permissions:
      id-token: write
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run OpenCode analysis
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/nemotron-3-ultra-free
          prompt: |
            Scheduled check completed. E2E tests: ${{ needs.e2e.result }}. Lighthouse: ${{ needs.lighthouse.result }}.
            If either failed, analyze the codebase and create an issue describing what needs to be fixed.
            If both passed, do nothing — just confirm everything is healthy.
